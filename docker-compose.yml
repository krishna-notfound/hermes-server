# docker-compose.yml
# Production Hermes stack behind Caddy.
#
# Public entry points:
#   https://${DASHBOARD_DOMAIN}  -> Hermes Workspace
#   https://${ROUTER_DOMAIN}     -> 9Router admin UI, optional
#
# Hermes Agent runs in the official Docker shape: one container starts
# `gateway run`, and the dashboard is supervised inside the same container via
# HERMES_DASHBOARD=1. Do not run a second dashboard container against the same
# /opt/data volume.

services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./volumes/caddy-data:/data
      - ./volumes/caddy-config:/config
    environment:
      - DASHBOARD_DOMAIN=${DASHBOARD_DOMAIN}
      - ROUTER_DOMAIN=${ROUTER_DOMAIN:-}
      - ACME_EMAIL=${ACME_EMAIL}
    depends_on:
      - workspace
      - hermes
    networks:
      - hermes
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  workspace:
    image: ghcr.io/outsourc-e/hermes-workspace:latest
    container_name: hermes-workspace
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Gateway/OpenAI-compatible API.
      - HERMES_API_URL=http://hermes:8642
      - HERMES_API_TOKEN=${API_SERVER_KEY}
      # Dashboard owns sessions, skills, config, MCP, and admin APIs.
      - HERMES_DASHBOARD_URL=http://hermes:9119
      - HERMES_DASHBOARD_PUBLIC_URL=http://hermes:9119
      # Workspace's own login password.
      - HERMES_PASSWORD=${HERMES_PASSWORD}
      - COOKIE_SECURE=1
      - TRUST_PROXY=1
    depends_on:
      hermes:
        condition: service_healthy
    networks:
      - hermes
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # OpenAI-compatible gateway used by Workspace and external API clients.
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${API_SERVER_KEY}
      # Built-in dashboard supervised by the same s6 tree as the gateway.
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_PUBLIC_URL=https://${DASHBOARD_DOMAIN}
      # Self-hosted dashboard auth provider. For public internet exposure,
      # prefer putting this hostname behind VPN/IP allowlisting or use OIDC.
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_BASIC_AUTH_USERNAME}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_BASIC_AUTH_PASSWORD}
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASHBOARD_BASIC_AUTH_SECRET}
      # Keep host volume ownership sane.
      - HERMES_UID=${HERMES_UID:-10000}
      - HERMES_GID=${HERMES_GID:-10000}
    volumes:
      - ./volumes/hermes:/opt/data
      - ./hermes/config.yaml:/opt/data/config.yaml:ro
    depends_on:
      9router:
        condition: service_started
    networks:
      - hermes
    command: ["gateway", "run"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8642/health').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  9router:
    image: decolua/9router:latest
    container_name: 9router
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - PORT=${PORT:-20128}
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - REQUIRE_API_KEY=true
      - AUTH_COOKIE_SECURE=true
      - HEADROOM_URL=http://headroom:8787
    volumes:
      - ./volumes/9router:/app/data
    depends_on:
      - headroom
    networks:
      - hermes
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:20128/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  headroom:
    image: ghcr.io/chopratejas/headroom:latest
    container_name: headroom
    restart: unless-stopped
    networks:
      - hermes
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  hermes:
    driver: bridge
